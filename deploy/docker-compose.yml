version: '3.8'

services:
  quiz-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: quiz-bot
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../configs:/app/configs
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
